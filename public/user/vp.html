<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Voice Pack</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --primary: #0f3460;
      --accent: #e94560;
      --text: #eee;
      --text2: #aaa;
      --green: #34C759;
      --red: #FF3B30;
      --blue: #007AFF;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh; height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: var(--surface);
      padding: 12px 16px;
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .header small { display: block; font-size: 12px; font-weight: 400; color: var(--text2); margin-top: 2px; }
    .user-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .user-list::-webkit-scrollbar { width: 4px; }
    .user-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.2s;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .user-item:hover { background: rgba(255,255,255,0.05); }
    .user-item.selected { background: rgba(0,122,255,0.15); }
    .user-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 15px; font-weight: 500; }
    .user-status { font-size: 12px; color: var(--text2); margin-top: 1px; }
    .user-online { color: var(--green); }
    .user-offline { color: var(--text2); }

    .recording-area {
      flex-shrink: 0;
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      min-height: 80px;
    }

    .mic-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 4px 20px rgba(233,69,96,0.35);
    }
    .mic-btn:active { transform: scale(0.9); }
    .mic-btn.recording {
      background: var(--red);
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,59,48,0.5); }
      100% { box-shadow: 0 0 0 20px rgba(255,59,48,0); }
    }
    .mic-btn.disabled {
      background: #333;
      box-shadow: none;
      cursor: default;
      opacity: 0.4;
    }

    .voice-negative-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border: 1.5px solid #555;
      border-radius: 8px;
      background: transparent;
      color: #888;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s;
    }
    .voice-negative-btn:hover { border-color: #777; color: #aaa; }
    .voice-negative-btn:active { background: rgba(255,255,255,0.05); }

    .cancel-btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid var(--red);
      background: transparent;
      color: var(--red);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cancel-btn:active { background: rgba(255,59,48,0.15); }

    .next-btn {
      padding: 10px 28px;
      border-radius: 8px;
      border: none;
      background: var(--blue);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .next-btn:active { opacity: 0.7; }

    .send-btn-vp {
      padding: 12px 36px;
      border-radius: 10px;
      border: none;
      background: var(--green);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(52,199,89,0.35);
    }
    .send-btn-vp:active { transform: scale(0.95); opacity: 0.8; }

    .recording-timer {
      font-size: 20px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--red);
      min-width: 60px;
      text-align: center;
    }
    .recording-wave {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 30px;
    }
    .recording-wave span {
      width: 4px;
      height: 100%;
      background: var(--red);
      border-radius: 2px;
      animation: wave 0.6s infinite ease-in-out alternate;
    }
    .recording-wave span:nth-child(1) { animation-delay: 0s; height: 40%; }
    .recording-wave span:nth-child(2) { animation-delay: 0.1s; height: 70%; }
    .recording-wave span:nth-child(3) { animation-delay: 0.2s; height: 30%; }
    .recording-wave span:nth-child(4) { animation-delay: 0.3s; height: 90%; }
    .recording-wave span:nth-child(5) { animation-delay: 0.4s; height: 50%; }
    @keyframes wave {
      0% { transform: scaleY(0.3); }
      100% { transform: scaleY(1); }
    }
    .recorded-info {
      font-size: 13px;
      color: var(--text2);
      text-align: center;
    }

    /* Progress overlay */
    .progress-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      flex-direction: column;
      gap: 20px;
    }
    .progress-overlay.show { display: flex; }
    .progress-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 32px 40px;
      text-align: center;
      min-width: 280px;
    }
    .progress-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .progress-bar-track {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--blue);
      border-radius: 3px;
      transition: width 0.15s;
    }
    .progress-percent {
      font-size: 14px;
      color: var(--text2);
      font-variant-numeric: tabular-nums;
    }
    .progress-status {
      font-size: 12px;
      color: var(--text2);
      margin-top: 8px;
    }

    /* Toast */
    .toast-vp {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 99;
      white-space: nowrap;
    }
    .toast-vp.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-vp.success { border-left: 3px solid var(--green); }
    .toast-vp.error { border-left: 3px solid var(--red); }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      gap: 8px;
      font-size: 14px;
    }
    .empty-state svg { opacity: 0.3; }
    .ready-label { color: var(--green); font-size: 13px; font-weight: 500; }
  </style>
</head>
<body>

  <div class="header">
    Voice Pack
    <small id="headerUser"></small>
  </div>

  <div class="user-list" id="userList"></div>

  <div class="recording-area" id="recordingArea">
    <div id="stateInit" style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <button class="voice-negative-btn" id="micBtn" onclick="startRecording()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        VOICE
      </button>
      <div style="font-size:12px;color:var(--text2);">Tap VOICE to record</div>
    </div>

    <div id="stateRecording" style="display:none;align-items:center;gap:16px;width:100%;">
      <button class="cancel-btn" onclick="cancelRecording()">Cancel</button>
      <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:12px;">
        <div class="recording-wave"><span></span><span></span><span></span><span></span><span></span></div>
        <div class="recording-timer" id="recTimer">00:00</div>
      </div>
      <button class="next-btn" onclick="nextRecording()">Next</button>
    </div>

    <div id="stateReady" style="display:none;flex-direction:column;align-items:center;gap:10px;">
      <div class="ready-label">Recording ready</div>
      <div class="recorded-info" id="recordedInfo"></div>
      <div style="display:flex;gap:12px;">
        <button class="cancel-btn" onclick="resetAll()">Discard</button>
        <button class="send-btn-vp" onclick="sendVoice()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:6px;">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
          Send
        </button>
      </div>
    </div>

    <div id="stateSending" style="display:none;flex-direction:column;align-items:center;gap:8px;">
      <div class="progress-bar-track" style="width:200px;">
        <div class="progress-bar-fill" id="sendProgressFill"></div>
      </div>
      <div class="progress-percent" id="sendProgressPct">0%</div>
      <div style="font-size:12px;color:var(--text2);">Uploading voice message...</div>
    </div>
  </div>

  <div class="progress-overlay" id="progressOverlay">
    <div class="progress-card">
      <div class="progress-title">Sending Voice Message</div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="overlayProgressFill"></div>
      </div>
      <div class="progress-percent" id="overlayProgressPct">0%</div>
      <div class="progress-status" id="overlayProgressStatus">Starting upload...</div>
    </div>
  </div>

  <div class="toast-vp" id="toastVp"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyB2j604pnQWRzpu_yE0biwWktths5TxW38",
      authDomain: "own-chat-app-d5fd0.firebaseapp.com",
      projectId: "own-chat-app-d5fd0",
      storageBucket: "own-chat-app-d5fd0.firebasestorage.app",
      messagingSenderId: "191123388943",
      appId: "1:191123388943:web:2a352c0912c015e5e1017a"
    });

    const db = firebase.firestore();
    const storage = firebase.storage();

    const myId = localStorage.getItem('chatUserId');
    const myName = localStorage.getItem('chatUserName') || '';
    let selectedUserId = null;
    let allUsers = [];
    let unsubUsers = null;

    let mediaRecorder = null;
    let audioChunks = [];
    let audioBlob = null;
    let audioDuration = 0;
    let recordingTimerInt = null;
    let recSeconds = 0;
    let isRecording = false;

    let voiceSendInProgress = false;

    const $ = id => document.getElementById(id);

    function showToast(msg, type) {
      const t = $('toastVp');
      t.textContent = msg;
      t.className = 'toast-vp ' + (type||'') + ' show';
      clearTimeout(t._hide);
      t._hide = setTimeout(() => t.classList.remove('show'), 3000);
    }

    function formatTime(sec) {
      const m = String(Math.floor(sec / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return m + ':' + s;
    }

    $('headerUser').textContent = myName ? 'Logged in as ' + myName : 'Not logged in';

    if (!myId) {
      $('userList').innerHTML = '<div class="empty-state">Please login from the main chat app first.</div>';
      $('micBtn').classList.add('disabled');
    } else {
      loadUsers();
    }

    function loadUsers() {
      unsubUsers = db.collection('users').orderBy('name', 'asc').onSnapshot(snap => {
        allUsers = [];
        snap.forEach(doc => {
          const d = doc.data();
          if (doc.id !== myId && !d.deleted) {
            allUsers.push({ id: doc.id, name: d.name || 'Unknown', online: d.is_online || false });
          }
        });
        renderUsers();
      });
    }

    function renderUsers() {
      const list = $('userList');
      if (allUsers.length === 0) {
        list.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><div>No other users found</div></div>';
        return;
      }
      list.innerHTML = allUsers.map(u => `
        <div class="user-item${selectedUserId === u.id ? ' selected' : ''}" data-id="${u.id}" onclick="selectUser('${u.id}')">
          <div class="user-avatar">${u.name.charAt(0).toUpperCase()}</div>
          <div class="user-info">
            <div class="user-name">${u.name}</div>
            <div class="user-status ${u.online ? 'user-online' : 'user-offline'}">${u.online ? 'Online' : 'Offline'}</div>
          </div>
        </div>
      `).join('');
    }

    function selectUser(id) {
      selectedUserId = id;
      renderUsers();
      showToast('Selected ' + allUsers.find(u => u.id === id)?.name, 'success');
    }

    // ==================== RECORDING ====================
    async function startRecording() {
      if (voiceSendInProgress) return;
      if (!selectedUserId) {
        showToast('Please select a user first', 'error');
        return;
      }
      if (isRecording) return;

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        recSeconds = 0;
        isRecording = true;

        mediaRecorder = new MediaRecorder(stream, { mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm' });

        mediaRecorder.ondataavailable = e => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
          audioDuration = recSeconds;
          isRecording = false;
        };

        mediaRecorder.start(100);
        showRecordingUI();
        startTimer();
      } catch (err) {
        showToast('Cannot access microphone. Please allow permissions.', 'error');
      }
    }

    function showRecordingUI() {
      $('stateInit').style.display = 'none';
      $('stateRecording').style.display = 'flex';
      $('stateReady').style.display = 'none';
      $('stateSending').style.display = 'none';
    }

    function startTimer() {
      $('recTimer').textContent = '00:00';
      recordingTimerInt = setInterval(() => {
        recSeconds++;
        $('recTimer').textContent = formatTime(recSeconds);
      }, 1000);
    }

    function stopTimer() {
      clearInterval(recordingTimerInt);
      recordingTimerInt = null;
    }

    function cancelRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.ondataavailable = null;
        mediaRecorder.onstop = null;
        mediaRecorder.stop();
      }
      stopTimer();
      isRecording = false;
      audioChunks = [];
      audioBlob = null;
      resetToInit();
    }

    function nextRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      stopTimer();
      if (!audioBlob || audioChunks.length === 0) {
        showToast('No audio recorded', 'error');
        resetToInit();
        return;
      }

      $('stateRecording').style.display = 'none';
      $('stateReady').style.display = 'flex';
      const sizeKB = Math.round(audioBlob.size / 1024);
      const sizeStr = sizeKB < 1000 ? sizeKB + ' KB' : (sizeKB / 1024).toFixed(1) + ' MB';
      $('recordedInfo').textContent = formatTime(audioDuration) + ' · ' + sizeStr;
    }

    function resetAll() {
      audioBlob = null;
      audioChunks = [];
      audioDuration = 0;
      resetToInit();
    }

    function resetToInit() {
      $('stateInit').style.display = 'flex';
      $('stateRecording').style.display = 'none';
      $('stateReady').style.display = 'none';
      $('stateSending').style.display = 'none';
    }

    // ==================== SEND VOICE ====================
    async function sendVoice() {
      if (!audioBlob || voiceSendInProgress) return;
      if (!selectedUserId) { showToast('No user selected', 'error'); return; }

      voiceSendInProgress = true;
      $('stateReady').style.display = 'none';
      $('stateSending').style.display = 'flex';
      $('sendProgressFill').style.width = '0%';
      $('sendProgressPct').textContent = '0%';

      const progressOverlay = $('progressOverlay');
      progressOverlay.classList.add('show');
      $('overlayProgressFill').style.width = '0%';
      $('overlayProgressPct').textContent = '0%';
      $('overlayProgressStatus').textContent = 'Uploading voice message...';

      try {
        const fileName = 'voice/' + myId + '/' + Date.now() + '.webm';
        const ref = storage.ref(fileName);
        const uploadTask = ref.put(audioBlob);

        uploadTask.on('state_changed',
          snapshot => {
            const pct = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
            $('sendProgressFill').style.width = pct + '%';
            $('sendProgressPct').textContent = pct + '%';
            $('overlayProgressFill').style.width = pct + '%';
            $('overlayProgressPct').textContent = pct + '%';
          },
          err => {
            console.error('Upload error:', err);
            progressOverlay.classList.remove('show');
            voiceSendInProgress = false;
            showToast('Upload failed. Please try again.', 'error');
            resetToInit();
          },
          async () => {
            const url = await uploadTask.snapshot.ref.getDownloadURL();
            $('overlayProgressStatus').textContent = 'Saving message...';

            const convId = [myId, selectedUserId].sort().join('_');
            await db.collection('messages').add({
              conversation: convId,
              from: myId,
              to: selectedUserId,
              voice: url,
              voice_duration: audioDuration,
              created_at: firebase.firestore.FieldValue.serverTimestamp(),
              edited: false,
              deleted: false
            });

            progressOverlay.classList.remove('show');
            voiceSendInProgress = false;
            showToast('Voice message sent!', 'success');
            resetAll();
          }
        );
      } catch (err) {
        console.error('Send error:', err);
        progressOverlay.classList.remove('show');
        voiceSendInProgress = false;
        showToast('Failed to send voice message.', 'error');
        resetToInit();
      }
    }

    // Cleanup
    window.addEventListener('beforeunload', () => {
      if (unsubUsers) unsubUsers();
    });
  </script>
</body>
</html>
